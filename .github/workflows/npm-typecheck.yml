name: NPM Typecheck

on: [push]

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: 'Checkout code'
              uses: actions/checkout@v4

            - name: 'Use Node.js'
              uses: actions/setup-node@v4
              with:
                  node-version: '22.x'

            - name: 'Install npm dependencies'
              run: |
                  npm ci
                  npm install @rollup/rollup-linux-x64-gnu --no-save

            - name: 'Run type check'
              run: npm run typecheck
