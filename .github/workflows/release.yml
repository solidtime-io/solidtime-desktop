name: Build/release Electron app

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    release:
        runs-on: ${{ matrix.os }}
        env:
            SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}

        strategy:
            matrix:
                include:
                    - os: macos-latest
                      platform: mac
                      arch: arm64
                    - os: macos-15-intel
                      platform: mac
                      arch: x64
                    - os: ubuntu-latest
                      platform: linux
                      arch: x64
                    - os: ubuntu-24.04-arm
                      platform: linux
                      arch: arm64
                    - os: windows-latest
                      platform: windows
                      arch: x64
                    - os: windows-11-arm
                      platform: windows
                      arch: arm64

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v3

            - name: Determine release type
              id: release-type
              shell: bash
              run: |
                  if [[ "${{ github.ref_name }}" == *"-"* ]]; then
                    echo "ep_pre_release=true" >> $GITHUB_OUTPUT
                  else
                    echo "ep_pre_release=false" >> $GITHUB_OUTPUT
                  fi

            - name: Install snapcraft (Linux)
              if: matrix.platform == 'linux'
              run: sudo snap install snapcraft --classic

            - name: Install system FPM (Linux ARM64)
              if: matrix.platform == 'linux' && matrix.arch == 'arm64'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ruby ruby-dev rubygems build-essential
                  sudo gem install --no-document fpm

            - name: Install Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm install

            - name: Build
              run: npm run build

            - name: Run Electron Builder (Windows)
              if: matrix.platform == 'windows'
              run: npx electron-builder --windows --${{ matrix.arch }} --publish always
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
                  EP_PRE_RELEASE: ${{ steps.release-type.outputs.ep_pre_release }}

            - name: Run Electron Builder (Linux)
              if: matrix.platform == 'linux'
              run: npx electron-builder --linux --${{ matrix.arch }} --publish always
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
                  USE_SYSTEM_FPM: ${{ matrix.arch == 'arm64' && 'true' || 'false' }}
                  EP_PRE_RELEASE: ${{ steps.release-type.outputs.ep_pre_release }}

            - name: Run Electron Builder (macOS)
              if: matrix.platform == 'mac'
              run: |
                  echo "$API_KEY" > apple.p8
                  npx electron-builder --mac --${{ matrix.arch }} --publish always
              env:
                  GH_TOKEN: ${{ secrets.GH_TOKEN }}
                  CSC_LINK: ${{ secrets.MAC_CERTS }}
                  CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
                  API_KEY: ${{ secrets.API_KEY }}
                  APPLE_API_KEY: apple.p8
                  APPLE_API_KEY_ID: ${{ secrets.API_KEY_ID }}
                  APPLE_API_ISSUER: ${{ secrets.API_KEY_ISSUER_ID }}
                  EP_PRE_RELEASE: ${{ steps.release-type.outputs.ep_pre_release }}
